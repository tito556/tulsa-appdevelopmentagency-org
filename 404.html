<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Page not found | Tulsa App Studio</title>
<meta name="robots" content="noindex,follow">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f7fafa;color:#1a2122;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:520px}
.code{font-size:5rem;font-weight:800;color:#10b981;line-height:1}
h1{font-size:1.6rem;margin:.4rem 0 .8rem;color:#0f3a3a}
p{color:#64748b;margin-bottom:1.6rem;line-height:1.6}
a.btn{display:inline-block;background:#0f3a3a;color:#fff;text-decoration:none;padding:.8rem 1.6rem;border-radius:9999px;font-weight:700}
a.btn:hover{background:#10b981}
</style>
</head>
<body>
<div class="wrap">
<div class="code">404</div>
<h1>Page not found</h1>
<p>The page you are looking for does not exist or has moved.</p>
<a class="btn" href="/">Back to home</a>
</div>
</body>
</html>
